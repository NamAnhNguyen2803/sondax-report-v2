<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Báo Cáo Inbound VN · Ấn bản T7/2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=10"></script>
<script type="text/babel" src="shell.jsx?v=4"></script>
<script type="text/babel" src="page_home.jsx?v=3"></script>
<script type="text/babel" src="page_months.jsx?v=6"></script>
<script type="text/babel" src="page_tours.jsx?v=4"></script>
<script type="text/babel" src="page_markets.jsx?v=3"></script>
<script type="text/babel" src="page_otas.jsx?v=4"></script>
<script type="text/babel" src="page_halong.jsx?v=1"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tone": "neutral",
  "type": "serif",
  "density": "normal",
  "mode": "light"
}/*EDITMODE-END*/;

function applyTweaks(t) {
  const b = document.body;
  b.classList.remove('tone-warm', 'tone-cool', 'type-sans', 'density-compact', 'dark');
  if (t.tone === 'warm') b.classList.add('tone-warm');
  if (t.tone === 'cool') b.classList.add('tone-cool');
  if (t.type === 'sans') b.classList.add('type-sans');
  if (t.density === 'compact') b.classList.add('density-compact');
  if (t.mode === 'dark') b.classList.add('dark');
}

function App() {
  const { route, history, go, back, goBreadcrumb } = useRouter();
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(() => {
    try {
      const saved = localStorage.getItem('bcvn.tweaks');
      if (saved) return { ...TWEAK_DEFAULTS, ...JSON.parse(saved) };
    } catch (e) {}
    return TWEAK_DEFAULTS;
  });

  useEffect(() => {
    applyTweaks(tweaks);
    localStorage.setItem('bcvn.tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  // Tweaks host protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onSetTweaks = (next) => {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  let page;
  if (route.tab === 'home') page = <Home go={go} />;
  else if (route.tab === 'months') page = <MonthsPage route={route} go={go} />;
  else if (route.tab === 'tours') page = <ToursPage route={route} go={go} />;
  else if (route.tab === 'markets') page = <MarketsPage route={route} go={go} />;
  else if (route.tab === 'otas') page = <OtasPage route={route} go={go} />;
  else page = <Home go={go} />;

  const screenLabel = labelRoute(route);

  return (
    <div data-screen-label={screenLabel}>
      <Masthead route={route} go={go} />
      <Breadcrumb history={history} back={back} goBreadcrumb={goBreadcrumb} />
      {page}
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={onSetTweaks} onClose={() => setTweaksOpen(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
